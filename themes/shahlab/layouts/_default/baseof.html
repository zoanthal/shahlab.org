<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ with .Section }}section-{{ . }}{{ end }}{{ if .IsHome }} is-home{{ end }}">
  {{ partial "header.html" . }}

  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
