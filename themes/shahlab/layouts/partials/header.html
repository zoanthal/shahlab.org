<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-logo">
      {{ with .Site.Params.logo }}
        <img src="{{ . | relURL }}" alt="{{ $.Site.Title }}">
      {{ end }}
      O'Reilly-Shah Lab
    </a>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}{{ if hasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
